<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thymos Neuro | PHX Division</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Space+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030712;
            --glass: rgba(17, 24, 39, 0.7);
            --accent: #3b82f6;
            --text: #f3f4f6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body { 
            background-color: var(--bg); 
            color: var(--text); 
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 50%, #1e293b 0%, #030712 100%);
        }

        /* --- NAVIGATION --- */
        nav {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            background: var(--glass); backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 50px;
        }

        .nav-links { display: flex; gap: 30px; list-style: none; }
        .nav-links a { 
            color: var(--text); text-decoration: none; font-weight: 500; font-size: 0.9rem;
            text-transform: uppercase; letter-spacing: 1px; transition: 0.3s;
        }
        .nav-links a:hover { color: var(--accent); }

        /* --- THE BRAIN-T ICON --- */
        .brain-t {
            width: 50px; height: 50px; background: var(--accent);
            border-radius: 50% 50% 40% 40%; position: relative;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.6);
            animation: pulse 2s infinite;
        }
        .brain-t::before { content: 'T'; font-family: 'Space Mono'; font-weight: bold; font-size: 1.5rem; color: white; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        /* --- HERO SECTION --- */
        .hero { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .hero h1 { font-size: 4rem; letter-spacing: -2px; margin-bottom: 10px; }
        .hero p { font-family: 'Space Mono'; color: var(--accent); margin-bottom: 30px; }

        .btn-join {
            background: var(--accent); color: white; padding: 15px 40px;
            border-radius: 50px; text-decoration: none; font-weight: bold;
            display: inline-flex; align-items: center; gap: 15px; transition: 0.3s;
        }
        .btn-join:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(59, 130, 246, 0.4); }

        /* --- SIDEWAYS SCROLL (INSTA-STYLE) --- */
        .field-reports { padding: 80px 20px; text-align: center; }
        .scroll-container {
            display: flex; overflow-x: auto; gap: 20px; padding: 40px 0;
            scroll-snap-type: x mandatory; scrollbar-width: none;
        }
        .scroll-container::-webkit-scrollbar { display: none; }
        .report-card {
            flex: 0 0 300px; height: 350px; background: var(--glass);
            border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
            scroll-snap-align: center; overflow: hidden; position: relative;
        }
        .report-card img { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }
        .report-tag { position: absolute; bottom: 20px; left: 20px; font-family: 'Space Mono'; font-size: 0.8rem; background: var(--accent); padding: 5px 10px; border-radius: 5px; }

        /* --- FORM SECTION --- */
        .form-section { padding: 100px 20px; max-width: 800px; margin: auto; }
        .glass-panel { background: var(--glass); padding: 40px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); }
        input, select, textarea { 
            width: 100%; padding: 15px; margin: 10px 0; background: rgba(0,0,0,0.3); 
            border: 1px solid #374151; color: white; border-radius: 10px;
        }
    </style>
</head>
<body>

    <nav>
        <div style="display: flex; align-items: center; gap: 15px;">
            <div class="brain-t"></div>
            <span style="font-weight: bold; letter-spacing: 2px;">THYMOS</span>
        </div>
        <ul class="nav-links">
            <li><a href="#">Intel</a></li>
            <li><a href="#">Directorate</a></li>
            <li><a href="#">Research</a></li>
            <li><a href="#">Archive</a></li>
            <li><a href="#">Portal</a></li>
        </ul>
    </nav>

    <section class="hero">
        <h1>EXPANSION PHASE 01</h1>
        <p>[390-MAN GLOBAL INITIATIVE]</p>
        <a href="#join" class="btn-join">JOIN OPERATIONS <div class="brain-t" style="width: 25px; height: 25px; box-shadow: none;"></div></a>
    </section>

    <section id="join" class="form-section">
        <div class="glass-panel">
            <h2 style="margin-bottom: 20px;">DIAGNOSTIC INTAKE</h2>
            <form action="YOUR_WEBHOOK_URL" method="POST">
                <input type="text" placeholder="Full Identity (Name)" required>
                <input type="text" placeholder="Discord Operative Tag" required>
                <select required>
                    <option value="" disabled selected>Target Division</option>
                    <option>Executive Directorate</option>
                    <option>Research & Physics</option>
                    <option>Tech & Systems</option>
                    <option>Outreach & Finance</option>
                </select>
                <textarea placeholder="Portfolio / Evidence of Utility" rows="4"></textarea>
                <button type="submit" class="btn-join" style="width: 100%; border: none; cursor: pointer; justify-content: center;">SUBMIT DOSSIER</button>
            </form>
        </div>
    </section>

    <section class="field-reports">
        <h2 style="font-family: 'Space Mono'; letter-spacing: 5px;">FIELD REPORTS</h2>
        <div class="scroll-container">
            <div class="report-card"><img src="https://images.unsplash.com/photo-1507413245164-6160d8298b31?auto=format&fit=crop&w=300" alt="R1"><div class="report-tag">NEURAL_MAP_V1</div></div>
            <div class="report-card"><img src="https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&w=300" alt="R2"><div class="report-tag">DATA_SYNC</div></div>
            <div class="report-card"><img src="https://images.unsplash.com/photo-1635070041078-e363dbe005cb?auto=format&fit=crop&w=300" alt="R3"><div class="report-tag">PHX_CORE</div></div>
            <div class="report-card"><img src="https://images.unsplash.com/photo-1614728263952-84ea206f99b6?auto=format&fit=crop&w=300" alt="R4"><div class="report-tag">INTEL_09</div></div>
            <div class="report-card"><img src="https://images.unsplash.com/photo-1532187875605-2fe35851142b?auto=format&fit=crop&w=300" alt="R5"><div class="report-tag">RESEARCH_04</div></div>
        </div>
    </section>

</body>
</html>
