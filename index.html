<!DOCTYPE html>
<html lang="en">
<head>
    <title>THYMOS NEURO | Operative Diagnostic</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        :root { 
            --bg: #f8fafc; 
            --glass: rgba(255, 255, 255, 0.95);
            --text: #0f172a; 
            --accent: #2563eb; 
            --dark: #1e293b;
        }
        body { 
            background: radial-gradient(circle at top right, #e2e8f0, #f1f5f9); 
            color: var(--text); font-family: 'Inter', -apple-system, sans-serif; 
            margin: 0; padding: 40px 20px; display: flex; justify-content: center;
        }
        .form-container { 
            max-width: 650px; width: 100%; 
            background: var(--glass); backdrop-filter: blur(15px);
            padding: 45px; border-radius: 24px; border: 1px solid white;
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
        }
        h2 { font-size: 2.2rem; margin: 0; letter-spacing: -1px; font-weight: 900; }
        .subtitle { color: var(--accent); font-weight: 800; font-size: 0.75rem; text-transform: uppercase; margin-bottom: 30px; letter-spacing: 2px; }

        .hierarchy-box { 
            background: var(--dark); color: white; padding: 25px; 
            border-radius: 15px; margin-bottom: 35px; border-left: 4px solid #06b6d4;
        }
        .doc-link { color: #06b6d4; text-decoration: none; font-weight: 800; font-size: 0.9rem; }
        .doc-link:hover { text-decoration: underline; }

        /* --- FORM GRID --- */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .full-width { grid-column: span 2; }

        .group { margin-bottom: 20px; }
        label { display: block; font-weight: 700; margin-bottom: 8px; font-size: 0.8rem; color: #64748b; text-transform: uppercase; }
        input, select, textarea { 
            width: 100%; padding: 14px; border-radius: 10px; border: 1px solid #cbd5e1;
            background: white; font-size: 1rem; box-sizing: border-box; transition: 0.2s;
        }
        input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }

        .submit-btn { 
            width: 100%; padding: 20px; background: var(--dark); color: white; 
            border: none; border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.3s; font-size: 1.1rem;
        }
        .submit-btn:hover { background: var(--accent); transform: translateY(-2px); box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2); }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>Operative Diagnostic</h2>
        <div class="subtitle">Thymos Neuro • Phx Division</div>

        <div class="hierarchy-box">
            <h4 style="margin:0 0 10px 0; font-size: 0.8rem; color: #06b6d4; text-transform: uppercase;">⚠️ Mandatory Briefing</h4>
            <p style="font-size: 0.85rem; margin-bottom: 15px; opacity: 0.8;">Identify your designation within the 390-man expansion before transmitting.</p>
            <a href="https://docs.google.com/document/d/13In1GFXuGDf0e_xlH3TLc-woN2C9PQCWMtxooZpJw7E/edit?usp=sharing" target="_blank" class="doc-link">📂 OPEN HIERARCHY DOC</a>
        </div>

        <form action="https://formspree.io/f/xaqpzoly" method="POST" class="form-grid">
            
            <div class="group full-width">
                <label>Full Name / Operative Alias</label>
                <input type="text" name="name" placeholder="John Doe" required>
            </div>

            <div class="group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="name@example.com" required>
            </div>

            <div class="group">
                <label>Phone Number</label>
                <input type="tel" name="phone" placeholder="(602) 000-0000">
            </div>

            <div class="group">
                <label>Discord Tag</label>
                <input type="text" name="discord" placeholder="username#0000" required>
            </div>

            <div class="group">
                <label>Current School/Institution</label>
                <input type="text" name="school" placeholder="BASIS, ASU, etc.">
            </div>

            <div class="group">
                <label>Target Designation</label>
                <select name="tier" required>
                    <option value="" disabled selected>Select Tier...</option>
                    <option value="directorate">Directorate Support</option>
                    <option value="research">Research & Theory</option>
                    <option value="outreach">Community Outreach</option>
                    <option value="infrastructure">Infrastructure/Discord</option>
                </select>
            </div>

            <div class="group">
                <label>Lead Source</label>
                <select name="source">
                    <option value="instagram">Instagram</option>
                    <option value="discord">Discord Referral</option>
                    <option value="school">School/Word of Mouth</option>
                    <option value="dr_interested">Dr. Interested Network</option>
                </select>
            </div>

            <div class="group full-width">
                <label>Utility Statement</label>
                <textarea name="message" rows="4" placeholder="Briefly describe your contribution to the expansion."></textarea>
            </div>

            <button type="submit" class="submit-btn full-width">TRANSMIT DOSSIER :P</button>
        </form>
    </div>

</body>
</html>
